apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-case-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-case-app
  template:
    metadata:
      labels:
        app: devops-case-app
    spec:
      containers:
      - name: app
        image: devops-case-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-case-service
spec:
  type: NodePort
  selector:
    app: devops-case-app
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
