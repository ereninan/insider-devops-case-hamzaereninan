apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-case-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-case-app
  template:
    metadata:
      labels:
        app: devops-case-app
    spec:
      containers:
      - name: app
        # İmajı GitHub Container Registry'den (GHCR) çekeceğiz
        image: ghcr.io/ereninan/devops-case-app:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-case-service
spec:
  type: NodePort
  selector:
    app: devops-case-app
  ports:
    - port: 80
      targetPort: 3000
      # Dışarıdan erişmek için kullanacağımız port (30000-32767 arası olmalı)
      nodePort: 30080
